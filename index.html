      function getCouponCategoryLabel(coupon) {
        if (!coupon) return "";
        const fromField = coupon.category != null ? String(coupon.category).trim() : "";
        if (fromField) return fromField;
        if (typeof coupon.condition === "string") {
          const m = coupon.condition.match(/^(.+?) 카테고리 상품 결제 시$/);
          if (m && m[1]) return m[1].trim();
        }
        return "";
      }

      function isGlobalCoupon(coupon) {
        if (!coupon) return false;
        return coupon.title === "신규회원 웰컴 쿠폰";
      }

      function isCouponApplicableToCart(coupon, cartItems) {
        if (!coupon || cartItems.length === 0) return false;
        if (isGlobalCoupon(coupon)) return true;
        if (!coupon.category) return true;
        return cartItems.some((item) => item.category === coupon.category);
      }

      function calculateCouponDiscount(coupon, orderAmount, cartItems) {
        if (!coupon || !isCouponApplicableToCart(coupon, cartItems)) return 0;

        const eligibleAmount = isGlobalCoupon(coupon)
          ? orderAmount
          : cartItems
              .filter((item) => !coupon.category || item.category === coupon.category)
              .reduce((sum, item) => sum + item.price * item.quantity, 0);

        if (typeof coupon.discountRate === "number") {
          return Math.floor((eligibleAmount * coupon.discountRate) / 100);
        }
        if (typeof coupon.discountAmount === "number") {
          return coupon.discountAmount;
        }
        return 0;
      }

        const start = new Date(end.getFullYear(), end.getMonth(), end.getDate() - 6);
        return `${formatConsumptionReportDate(start)} ~ ${formatConsumptionReportDate(end)} 기준`;

        setCouponNotification(true);
        userNickname = safeNick;
        showCouponIssueModal(`관심 보이신 <strong>${categoryName}</strong> 스페셜 쿠폰이 발급되었습니다🎁`);
      }

      function scheduleCouponIssueForCategory(categoryName, productName) {
        clearCouponIssueTimer();
        couponIssueTimer = window.setTimeout(() => {
          issueCategoryCoupon(categoryName, productName);
          couponIssueTimer = null;
        }, 3300);
      }

      function setDetailImage(imagePath) {
        if (!detailImage) return;
        detailImage.onerror = null;
        detailImage.src = imagePath;
      }

      function showDetail(productId) {
        const product = getProduct(productId);
        if (!product) return;

        clearCouponIssueTimer();
        currentProductId = product.id;
        lastViewedProductId = product.id;
        lastViewedProductName = product.name || null;
        lastViewedCategory = product.category || null;
        isPurchaseActionTaken = false;
        setDetailImage(product.img);
        detailPurchaseButton?.setAttribute("aria-label", `${product.name} 구매하기`);
        showPage("detail");
      }

      function showProductDetail(productId) {
        if (!productId) return;
        showDetail(productId);
      }

      function addToCart(productId) {
        const product = getProduct(productId);
        if (!product) return;
        isPurchaseActionTaken = true;
        clearCouponIssueTimer();
        const id = product.id;

        const existing = cart.find((item) => item.id === id);
        if (existing) {
          existing.quantity += 1;
        } else {
          cart.push({
            id: product.id,
            name: product.name,
            price: product.price,
            quantity: 1,
            img: product.img,
            category: product.category,
          });
        }
        renderCart();
        updateTopbarCartCount();
      }

      function renderCart() {
        if (!cartContent) return;

        const orderAmount = cart.reduce((acc, item) => acc + item.price * item.quantity, 0);
        const selectedCouponObject = selectedCoupon ? getCouponById(selectedCoupon) : null;
        if (selectedCouponObject && !isCouponApplicableToCart(selectedCouponObject, cart)) {
          selectedCoupon = null;
        }
        const activeCoupon = selectedCoupon ? getCouponById(selectedCoupon) : null;
        const productDiscount = calculateCouponDiscount(activeCoupon, orderAmount, cart);
        const totalPrice = Math.max(orderAmount - productDiscount, 0);
        const activeCouponCategory = activeCoupon ? getCouponCategoryLabel(activeCoupon) : "";
        const activeCouponSummary =
          activeCoupon &&
          (activeCouponCategory
            ? `${activeCoupon.title} · ${activeCouponCategory}`
            : activeCoupon.title);
        const couponSelectorMarkup =
          cart.length === 0
            ? ""
            : `
                <section class="rounded-xl bg-white p-4 shadow-sm ring-1 ring-zinc-200">
                  <button
                    type="button"
                    data-coupon-action="toggle-selector"
                    class="flex w-full items-center justify-between text-sm font-semibold text-zinc-800"
                  >
                    <span>쿠폰 ▼</span>
                    <span class="truncate pl-3 text-xs font-medium text-zinc-500">${activeCoupon ? activeCouponSummary : "선택된 쿠폰 없음"}</span>
                  </button>
                  <div class="${cartCouponDropdownOpen ? "mt-3 block" : "hidden"} space-y-2">
                    <button
                      type="button"
                      data-coupon-action="clear-selector"
                      class="w-full rounded-lg border border-zinc-200 bg-zinc-50 px-3 py-2 text-left text-xs font-medium text-zinc-700"
                    >
                      쿠폰 사용 안함
                    </button>
                    ${coupons
                      .map((coupon) => {
                        const canUse = isCouponApplicableToCart(coupon, cart);
                        const categoryLabel = getCouponCategoryLabel(coupon);
                        const couponDiscountText =
                          typeof coupon.discountRate === "number"
                            ? `${coupon.discountRate}% 할인`
                            : `${formatPrice(coupon.discountAmount || 0)} 할인`;
                        const couponDetailLine =
                          typeof coupon.discountRate === "number"
                            ? categoryLabel
                              ? `${categoryLabel} ${coupon.discountRate}% 할인`
                              : `${coupon.discountRate}% 할인`
                            : couponDiscountText;
                        return `
                          <button
                            type="button"
                            data-coupon-action="select-coupon"
                            data-coupon-id="${coupon.id}"
                            ${canUse ? "" : "disabled"}
                            class="w-full rounded-lg border px-3 py-2 text-left text-xs ${
                              canUse
                                ? "border-zinc-200 bg-white text-zinc-800"
                                : "border-zinc-200 bg-zinc-100 text-zinc-400"
                            }"
                          >
                            <p class="font-semibold">${coupon.title}</p>
                            <p class="mt-1">${couponDetailLine}</p>
                          </button>
                        `;
                      })
                      .join("")}
                  </div>
                </section>
              `;
        const cartItemsMarkup =
          cart.length === 0
            ? '<div class="rounded-xl bg-white p-8 text-center text-sm text-zinc-500 shadow-sm ring-1 ring-zinc-200">장바구니가 비어있습니다.</div>'
            : cart
                .map((item) => {
                  const subtotal = item.price * item.quantity;
                  return `
                    <div class="flex items-center gap-3 rounded-xl bg-white p-3 shadow-sm ring-1 ring-zinc-200">
                      <img src="./design/cart_prod_${item.id}.jpg" onerror="this.onerror=null;this.src='${item.img}'" alt="${item.name}" class="h-14 w-14 rounded-lg object-cover bg-zinc-100" draggable="false" />
                      <div class="min-w-0 flex-1">
                        <p class="truncate text-sm font-semibold text-zinc-800">${item.name}</p>
                        <p class="text-xs text-zinc-500">${formatPrice(subtotal)}</p>
                      </div>
                      <div class="flex items-center gap-2">
                        <button type="button" data-cart-action="decrease" data-cart-id="${item.id}" class="h-7 w-7 rounded-full bg-zinc-200 text-sm font-bold text-zinc-700">-</button>
                        <span class="w-5 text-center text-sm font-semibold text-zinc-800">${item.quantity}</span>
                        <button type="button" data-cart-action="increase" data-cart-id="${item.id}" class="h-7 w-7 rounded-full bg-zinc-200 text-sm font-bold text-zinc-700">+</button>
                      </div>
                    </div>
                  `;
                })
                .join("");

        cartContent.innerHTML = `
          <div class="flex min-h-full flex-col">
            <div class="flex-1 space-y-4 px-4 py-4">
              <section class="space-y-3">${cartItemsMarkup}</section>
              ${couponSelectorMarkup}

              <section class="rounded-xl bg-white p-4 shadow-sm ring-1 ring-zinc-200">
                <div class="space-y-2 text-sm">
                  <div class="flex items-center justify-between text-zinc-600">
                    <span>주문 금액</span>
                    <span>${formatPrice(orderAmount)}</span>
                  </div>
                  <div class="flex items-center justify-between text-zinc-600">
                    <span>상품 할인</span>
                    <span>${formatPrice(productDiscount)}</span>
                  </div>
                  <div class="mt-2 border-t border-zinc-200 pt-2">
                    <div class="flex items-center justify-between text-base font-bold text-zinc-900">
                      <span>총 결제 예정 금액</span>
                      <span>${formatPrice(totalPrice)}</span>
                    </div>
                  </div>
                </div>
              </section>

              <button type="button" data-cart-action="checkout" class="w-full rounded-xl bg-violet-600 py-4 text-base font-bold text-white shadow-sm">
                결제하기
              </button>
            </div>

            <footer class="border-t border-zinc-200 bg-white px-4 py-3">
              <button type="button" data-cart-action="toggle-notice" class="flex w-full items-center justify-between py-2 text-sm font-medium text-zinc-700">
                <span>유의사항</span>
                <span class="text-zinc-400">${cartNoticeExpanded ? "▴" : "▾"}</span>
              </button>
              <div class="${cartNoticeExpanded ? "block" : "hidden"} pb-2 text-xs leading-5 text-zinc-500">
                주문 전 상품 수량 및 금액을 확인해 주세요. 프로모션/할인 조건은 결제 단계에서 최종 반영됩니다.
              </div>
              <a href="#" class="block py-2 text-xs font-medium text-zinc-600">고객센터 실시간 채팅 상담 바로가기</a>
            </footer>
          </div>
        `;
        updateTopbarCartCount();
      }

      function renderCoupons() {
        if (!couponList) return;

        if (coupons.length === 0) {
          couponList.innerHTML =
            '<div class="rounded-xl bg-white p-8 text-center text-sm text-zinc-500 shadow-sm ring-1 ring-zinc-200">사용 가능한 쿠폰이 없습니다.</div>';
          return;
        }

        couponList.innerHTML = `
          <div class="space-y-3">
            ${coupons
              .map((coupon) => {
                const nick = userNickname || "손님";
                const rate =
                  typeof coupon.discountRate === "number" ? coupon.discountRate : null;
                const categoryLabel = getCouponCategoryLabel(coupon);
                let line1 = coupon.title;
                let line2 = "";
                if (coupon.autoIssued) {
                  line1 = `${nick} 전용 쿠폰`;
                  if (categoryLabel && rate !== null) {
                    line2 = `${categoryLabel} ${rate}% 할인`;
                  } else if (rate !== null) {
                    line2 = `${rate}% 할인`;
                  }
                } else if (rate !== null) {
                  line2 = categoryLabel ? `${categoryLabel} ${rate}% 할인` : `${rate}% 할인`;
                }
                const couponReceiveButtonId = isGlobalCoupon(coupon)
                  ? ' id="btn-coupon-welcome"'
                  : coupon.autoIssued
                    ? ' id="btn-coupon-personalized"'
                    : "";
                const couponReceiveButtonText = coupon.autoIssued
                  ? "받기."
                  : "받기";
                return `
                  <article class="rounded-xl bg-white p-4 shadow-sm ring-1 ring-zinc-200">
                    <div class="flex items-start justify-between gap-3">
                      <div class="min-w-0">
                        <div class="flex flex-col gap-1 leading-tight [font-family:Inter,_sans-serif]">
                          <p class="text-base font-semibold text-zinc-900">${line1}</p>
                          ${
                            line2
                              ? `<p class="text-base font-bold text-violet-700">${line2}</p>`
                              : ""
                          }
                        </div>
                        <p class="mt-2 text-xs text-zinc-500">${coupon.condition}</p>
                        <p class="mt-1 text-xs text-zinc-400">유효기간: ${coupon.expiryDate}</p>
                      </div>
                      <button${couponReceiveButtonId}
                        type="button"
                        class="shrink-0 rounded-lg bg-violet-600 px-3 py-2 text-xs font-semibold text-white"
                        data-coupon-action="download"
                        data-coupon-id="${coupon.id}"
                      >
                        ${couponReceiveButtonText}
                      </button>
                    </div>
                  </article>
                `;
              })
              .join("")}
          </div>
        `;
      }

      function updateCartQuantity(productId, delta) {
        const item = cart.find((entry) => entry.id === String(productId));
        if (!item) return;
        item.quantity += delta;
        if (item.quantity <= 0) {
          const index = cart.findIndex((entry) => entry.id === String(productId));
          if (index > -1) cart.splice(index, 1);
        }
        renderCart();
      }

      function showPage(pageKey) {
        if (pageKey !== "product-list") {
          clearCouponIssueTimer();
        }
        if (pageKey === "cart" && currentPageKey !== "cart") {
          previousPageKey = currentPageKey;
        }
        currentPageKey = pageKey;

        const targetId = `page-${pageKey}`;
        pages.forEach((page) => {
          const isTarget = page.id === targetId;
          page.classList.toggle("hidden", !isTarget);
          page.classList.toggle(
            "flex",
            isTarget &&
              (page.id === "page-coupon" ||
                page.id === "page-menu" ||
                page.id === "page-detail")
          );

          if (isTarget && page.classList.contains("hide-scrollbar")) {
            page.scrollTo({ top: 0, behavior: "auto" });
          }
        });

        navButtons.forEach((button) => {
          const isActive = button.dataset.navTarget === pageKey;
          if (!button.hasAttribute("data-nav-qr")) {
            button.classList.toggle("text-black", isActive);
            button.classList.toggle("text-zinc-400", !isActive);
          }
        });

        if (topbarTitle) {
          topbarTitle.textContent = pageTitles[pageKey] || "";
        }
        if (globalTopBar) {
          globalTopBar.classList.toggle("hidden", pageKey === "home");
        }

        if (pageKey === "cart") {
          renderCart();
        }
        if (pageKey === "coupon") {
          setCouponNotification(false);
          renderCoupons();
        }
        if (pageKey === "home") {
          updateHomeConsumptionReportOverlay();
        }
      }

      navButtons.forEach((button) => {
        button.addEventListener("click", () => {
          if (button.hasAttribute("data-nav-qr")) return;
          showPage(button.dataset.navTarget);
        });
      });

      backButtons.forEach((button) => {
        button.addEventListener("click", () => {
          showPage(button.dataset.backTarget);
        });
      });

      if (productListPage) {
        productListPage.addEventListener("click", (e) => {
          const cartBtn = e.target.closest("[data-list-cart-id]");
          if (cartBtn) {
            const productId = cartBtn.dataset.listCartId?.trim();
            if (!productId) return;
            addToCart(productId);
            showEventCartToast();
            return;
          }
          const btn = e.target.closest("[data-product-id]");
          if (!btn) return;

          const productId = btn.dataset.productId?.trim();
          if (!productId) return;

          showDetail(productId);
        });
      }

      if (detailPurchaseButton) {
        detailPurchaseButton.addEventListener("click", () => {
          if (!currentProductId) return;
          addToCart(currentProductId);
          showAddToCartModal();
        });
      }

      if (cartContent) {
        cartContent.addEventListener("click", (e) => {
          const couponActionButton = e.target.closest("[data-coupon-action]");
          if (couponActionButton) {
            const couponAction = couponActionButton.dataset.couponAction;
            if (couponAction === "toggle-selector") {
              cartCouponDropdownOpen = !cartCouponDropdownOpen;
              renderCart();
              return;
            }
            if (couponAction === "clear-selector") {
              selectedCoupon = null;
              cartCouponDropdownOpen = false;
              renderCart();
              return;
            }
            if (couponAction === "select-coupon") {
              const couponId = couponActionButton.dataset.couponId;
              const coupon = couponId ? getCouponById(couponId) : null;
              if (coupon && isCouponApplicableToCart(coupon, cart)) {
                selectedCoupon = coupon.id;
              }
              cartCouponDropdownOpen = false;
              renderCart();
              return;
            }
          }

          const toggleNoticeButton = e.target.closest('[data-cart-action="toggle-notice"]');
          if (toggleNoticeButton) {
            cartNoticeExpanded = !cartNoticeExpanded;
            renderCart();
            return;
          }

          const button = e.target.closest("[data-cart-action]");
          if (!button) return;

          const action = button.dataset.cartAction;
          const productId = button.dataset.cartId;

          if (action === "checkout") {
            showCheckoutCompleteModal();
            return;
          }
          if (!productId) return;

          if (action === "increase") updateCartQuantity(productId, 1);
          if (action === "decrease") updateCartQuantity(productId, -1);
        });
      }

      if (couponList) {
        couponList.addEventListener("click", (e) => {
          const button = e.target.closest('[data-coupon-action="download"]');
          if (!button) return;
          window.alert("쿠폰이 발급되었습니다.");
        });
      }

      if (eventCouponHotspot) {
        eventCouponHotspot.classList.add("cursor-pointer");
        if (eventCouponIssued) {
          eventCouponHotspot.setAttribute("aria-label", "이벤트 쿠폰 발급 완료 (안내 다시 보기)");
        }
        eventCouponHotspot.addEventListener("click", (e) => {
          e.stopPropagation();
          issueEventCouponOnce();
        });
      }

      if (eventPage) {
        eventPage.addEventListener("click", (e) => {
          const cartBtn = e.target.closest("[data-event-cart-id]");
          if (!cartBtn) return;
          e.stopPropagation();
          const productId = cartBtn.dataset.eventCartId;
          if (!productId) return;
          addToCart(productId);
          showEventCartToast();
        });
      }

      if (promotionPage) {
        promotionPage.addEventListener("click", (e) => {
          const cartBtn = e.target.closest("[data-promotion-cart-id]");
          if (cartBtn) {
            const productId = cartBtn.dataset.promotionCartId;
            if (!productId) return;
            addToCart(productId);
            showEventCartToast();
            return;
          }
          const productBtn = e.target.closest("[data-promotion-product-id]");
          if (productBtn) {
            window.alert("본 상품은 프로모션 전용 상품으로 상세 페이지가 준비 중입니다.");
          }
        });
      }

      if (topbarBack) {
        topbarBack.addEventListener("click", () => {
          if (currentPageKey === "product-list") {
            showPage("home");
            return;
          }
          if (currentPageKey === "detail") {
            const categoryToIssue = !isPurchaseActionTaken ? lastViewedCategory : null;
            const productNameToIssue = !isPurchaseActionTaken ? lastViewedProductName : null;
            showPage("product-list");
            if (categoryToIssue) {
              scheduleCouponIssueForCategory(categoryToIssue, productNameToIssue);
            }
            return;
          }
          if (currentPageKey === "cart") {
            showPage(previousPageKey || "product-list");
            return;
          }
          if (currentPageKey === "coupon") {
            showPage("product-list");
            return;
          }
          if (currentPageKey === "menu") {
            showPage("home");
            return;
          }
          if (currentPageKey === "event") {
            showPage("home");
            return;
          }
          if (currentPageKey === "promotion") {
            showPage("home");
            return;
          }
        });
      }

      if (topbarCart) {
        topbarCart.addEventListener("click", () => {
          showPage("cart");
        });
      }

      if (topbarCoupon) {
        topbarCoupon.addEventListener("click", () => {
          showPage("coupon");
        });
      }

      if (homeBgHotspotCoupon) {
        homeBgHotspotCoupon.addEventListener("click", () => {
          showPage("coupon");
        });
      }

      if (homeBgHotspotCart) {
        homeBgHotspotCart.addEventListener("click", () => {
          showPage("cart");
        });
      }

      if (couponModalClose) {
        couponModalClose.addEventListener("click", () => {
          hideCouponIssueModal();
        });
      }

      if (couponModalRecent) {
        couponModalRecent.addEventListener("click", () => {
          hideCouponIssueModal();
          if (!lastViewedProductId) return;
          showProductDetail(lastViewedProductId);
        });
      }

      if (couponModalView) {
        couponModalView.addEventListener("click", () => {
          hideCouponIssueModal();
          showPage("coupon");
        });
      }

      if (couponIssueModal) {
        couponIssueModal.addEventListener("click", (e) => {
          if (e.target === couponIssueModal) {
            hideCouponIssueModal();
          }
        });
      }

      if (addToCartMoreButton) {
        addToCartMoreButton.addEventListener("click", () => {
          hideAddToCartModal();
          showPage("product-list");
        });
      }

      if (addToCartGoCartButton) {
        addToCartGoCartButton.addEventListener("click", () => {
          hideAddToCartModal();
          showPage("cart");
        });
      }

      if (addToCartModal) {
        addToCartModal.addEventListener("click", (e) => {
          if (e.target === addToCartModal) {
            hideAddToCartModal();
          }
        });
      }

      if (welcomeStartButton) {
        welcomeStartButton.addEventListener("click", () => {
          saveNickname();
        });
      }

      if (welcomeNicknameInput) {
        welcomeNicknameInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            saveNickname();
          }
        });
      }

      if (feedbackSurveyYes) {
        feedbackSurveyYes.addEventListener("click", () => {
          dismissFeedbackSurvey();
        });
      }

      if (feedbackSurveyNo) {
        feedbackSurveyNo.addEventListener("click", () => {
          dismissFeedbackSurvey();
        });
      }

      if (checkoutCompleteYes) {
        checkoutCompleteYes.addEventListener("click", () => {
          finalizeCheckoutFromModal();
        });
      }

      if (checkoutCompleteNo) {
        checkoutCompleteNo.addEventListener("click", () => {
          finalizeCheckoutFromModal();
        });
      }

      if (homeRollingBanner) {
        homeRollingBanner.addEventListener("click", () => {
          const currentDisplayIndex = ((rollingSlideIndex % rollingSlideCount) + rollingSlideCount) % rollingSlideCount;
          if (currentDisplayIndex === 0 || currentDisplayIndex === 2) {
            showPage("event");
            return;
          }
          if (currentDisplayIndex === 1) {
            showPage("promotion");
          }
        });
      }

      const savedNickname = window.sessionStorage.getItem("ampmUserNickname");
      userNickname = savedNickname?.trim().slice(0, 10) || "";
      if (!userNickname) {
        showWelcomeModal();
      }

      if (userNickname) {
        scheduleFeedbackSurvey();
      }

      setupRollingBannerLoop();
      moveRollingBanner(0);
      startRollingBanner();
      updateTopbarCartCount();
      updateHomeSnackBannerNickname();

      showPage("home");
    </script>
  </body>
</html>
